openapi: 3.0.3
info:
    title: Node.js REST API
    description: Production-ready REST API with JWT authentication
    version: 1.0.0
    contact:
        name: API Support
        email: support@example.com

servers:
    - url: http://localhost:3000/api/v1
      description: Development server
    - url: https://api.example.com/api/v1
      description: Production server

components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT

    schemas:
        Error:
            type: object
            properties:
                success:
                    type: boolean
                    example: false
                message:
                    type: string
                    example: Error message
                errors:
                    type: array
                    items:
                        type: object
                        properties:
                            field:
                                type: string
                            message:
                                type: string

        Success:
            type: object
            properties:
                success:
                    type: boolean
                    example: true
                message:
                    type: string
                data:
                    type: object

        User:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                email:
                    type: string
                    format: email
                firstName:
                    type: string
                lastName:
                    type: string
                role:
                    type: string
                    enum: [user, admin]
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        RegisterRequest:
            type: object
            required:
                - email
                - password
            properties:
                email:
                    type: string
                    format: email
                    example: john.doe@example.com
                password:
                    type: string
                    format: password
                    example: Password123
                firstName:
                    type: string
                    example: John
                lastName:
                    type: string
                    example: Doe

        LoginRequest:
            type: object
            required:
                - email
                - password
            properties:
                email:
                    type: string
                    format: email
                password:
                    type: string
                    format: password

        AuthResponse:
            type: object
            properties:
                success:
                    type: boolean
                message:
                    type: string
                data:
                    type: object
                    properties:
                        user:
                            $ref: '#/components/schemas/User'
                        accessToken:
                            type: string
                        refreshToken:
                            type: string

tokens:
    - accessToken
    - refreshToken

paths:
    /auth/register:
        post:
            tags:
                - Authentication
            summary: Register a new user
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RegisterRequest'
            responses:
                '201':
                    description: User registered successfully
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AuthResponse'
                '400':
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                '409':
                    description: Email already exists
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'

    /auth/login:
        post:
            tags:
                - Authentication
            summary: Login user
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/LoginRequest'
            responses:
                '200':
                    description: Login successful
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AuthResponse'
                '401':
                    description: Invalid credentials
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'

    /auth/refresh:
        post:
            tags:
                - Authentication
            summary: Refresh access token
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - refreshToken
                            properties:
                                refreshToken:
                                    type: string
            responses:
                '200':
                    description: Token refreshed successfully
                '401':
                    description: Invalid or expired refresh token

    /auth/profile:
        get:
            tags:
                - Authentication
            summary: Get user profile
            security:
                - bearerAuth: []
            responses:
                '200':
                    description: Profile retrieved successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                    message:
                                        type: string
                                    data:
                                        type: object
                                        properties:
                                            user:
                                                $ref: '#/components/schemas/User'
                '401':
                    description: Unauthorized

        put:
            tags:
                - Authentication
            summary: Update user profile
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                    format: email
                                firstName:
                                    type: string
                                lastName:
                                    type: string
            responses:
                '200':
                    description: Profile updated successfully
                '401':
                    description: Unauthorized
                '409':
                    description: Email already in use

    /auth/change-password:
        put:
            tags:
                - Authentication
            summary: Change password
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - currentPassword
                                - newPassword
                            properties:
                                currentPassword:
                                    type: string
                                    format: password
                                newPassword:
                                    type: string
                                    format: password
            responses:
                '200':
                    description: Password changed successfully
                '400':
                    description: Validation error
                '401':
                    description: Unauthorized

    /auth/logout:
        post:
            tags:
                - Authentication
            summary: Logout user
            security:
                - bearerAuth: []
            responses:
                '200':
                    description: Logged out successfully
                '401':
                    description: Unauthorized

    /auth/account:
        delete:
            tags:
                - Authentication
            summary: Deactivate account
            security:
                - bearerAuth: []
            responses:
                '200':
                    description: Account deactivated successfully
                '401':
                    description: Unauthorized

    /health:
        get:
            tags:
                - Health
            summary: Health check
            responses:
                '200':
                    description: Service is healthy
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                    message:
                                        type: string
                                    data:
                                        type: object
                                        properties:
                                            status:
                                                type: string
                                            version:
                                                type: string
                                            environment:
                                                type: string
                                            timestamp:
                                                type: string
                                            uptime:
                                                type: number

    /health/detailed:
        get:
            tags:
                - Health
            summary: Detailed health check
            responses:
                '200':
                    description: Detailed health check complete
