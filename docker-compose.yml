services:
    app:
        build:
            context: .
            target: development
        container_name: nodejs-api-dev
        ports:
            - '3000:3000'
        environment:
            - NODE_ENV=development
            - PORT=3000
            - JWT_SECRET=dev-secret-change-in-production
            - JWT_EXPIRES_IN=1d
            - JWT_REFRESH_EXPIRES_IN=7d
            - BCRYPT_ROUNDS=10
            - SUPABASE_URL=${SUPABASE_URL}
            - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
            - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
        volumes:
            - .:/app
            - /app/node_modules
        restart: unless-stopped
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--no-verbose',
                    '--tries=1',
                    '--spider',
                    'http://localhost:3000/health',
                ]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 5s

    app-prod:
        build:
            context: .
            target: production
        container_name: nodejs-api-prod
        ports:
            - '3000:3000'
        environment:
            - NODE_ENV=production
            - JWT_SECRET=${JWT_SECRET}
            - JWT_EXPIRES_IN=1d
            - JWT_REFRESH_EXPIRES_IN=7d
            - BCRYPT_ROUNDS=12
            - SUPABASE_URL=${SUPABASE_URL}
            - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
            - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
        restart: unless-stopped
        profiles:
            - production
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--no-verbose',
                    '--tries=1',
                    '--spider',
                    'http://localhost:3000/health',
                ]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 5s
